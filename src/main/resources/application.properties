spring.application.name=distributed-job-queue

# Environmental Variables
spring.config.import=optional:file:.env[.properties]

# ===== WHY WE HAVE BOTH DATABASES =====
# PostgreSQL: Source of truth. Survives restarts. Queryable.
# Redis: Fast queue operations (BLMOVE atomic). Workers read from here.
# Pattern: "Dual-write with PostgreSQL primary"

# Redis Credentials
redis.host=${REDIS_HOST}
redis.port=${REDIS_PORT}
redis.password=${REDIS_PASSWORD}
redis.ssl=${REDIS_USE_SSL:false}

# PostgreSQL Configuration
spring.datasource.url=jdbc:postgresql://${POSTGRES_HOST:localhost}:${POSTGRES_PORT:5432}/${POSTGRES_DB}
spring.datasource.username=${POSTGRES_USER}
spring.datasource.password=${POSTGRES_PASSWORD}
spring.datasource.driver-class-name=org.postgresql.Driver

# JPA Configuration
spring.jpa.hibernate.ddl-auto=update
# Set to true for debugging
spring.jpa.show-sql=false
spring.jpa.properties.hibernate.format_sql=true

# Actuator configuration
management.endpoints.web.exposure.include=prometheus,health,info
management.prometheus.metrics.export.enabled=true
management.endpoint.prometheus.enabled=true

management.metrics.tags.application=${spring.application.name}
management.metrics.tags.profile=${SPRING_PROFILES_ACTIVE:default}

# Logging Configuration
# Set to DEBUG for development, INFO for production
logging.level.root=INFO
logging.level.com.example.${POSTGRES_DB}=INFO

# Optional: Enable SQL logging only when needed (uncomment for debugging)
# logging.level.org.hibernate.SQL=DEBUG
# logging.level.org.hibernate.type.descriptor.sql.BasicBinder=TRACE

# Match the DB connections to the thread count
spring.datasource.hikari.maximum-pool-size=50
services:
  # ============================================
  # Redis Service - In-memory data store for job queue
  # ============================================
  redis:
    image: redis:7-alpine                        # Lightweight Redis 7 on Alpine Linux
    container_name: job-redis                    # Fixed container name for easy reference
    ports:
      - "6379:6379"                              # Map host port 6379 to container port 6379
    command: >                                   # Start Redis with password auth
      redis-server
      --requirepass ${REDIS_PASSWORD}
      --appendonly yes
      --appendfsync everysec
      --maxmemory 256mb
      --maxmemory-policy volatile-lru
    networks:
      - jobqueue-network                         # Custom network for service discovery
    healthcheck:
      # Verify Redis is ready to accept connections using authenticated ping
      test: [ "CMD", "redis-cli", "-a", "${REDIS_PASSWORD}", "ping" ]  # Authenticate with password before pinging
      interval: 5s                               # Check every 5 seconds
      timeout: 3s                                # Timeout after 3 seconds
      retries: 5                                 # Fail after 5 failed attempts

  # ============================================
  # PostgreSQL Database Service
  # ============================================
  postgres:
    image: postgres:16-alpine                    # Lightweight PostgreSQL 16 on Alpine Linux
    container_name: job-db                       # Fixed container name for easy reference
    ports:
      - "5433:5432"                              # Map host port 5433 to container port 5432 (avoids conflict with local Postgres)
    environment:
      - POSTGRES_DB=${POSTGRES_DB}               # Database name from .env file
      - POSTGRES_USER=${POSTGRES_USER}           # Database user from .env file
      - POSTGRES_PASSWORD=${POSTGRES_PASSWORD}   # Database password from .env file
    volumes:
      - postgres_data:/var/lib/postgresql/data   # Persist data even when container stops
    healthcheck:
      # Verify database is ready to accept connections before starting dependent services
      test: [ "CMD-SHELL", "pg_isready -U ${POSTGRES_USER} -d ${POSTGRES_DB}" ]
      interval: 5s                               # Check every 5 seconds
      timeout: 5s                                # Timeout after 5 seconds
      retries: 5                                 # Fail after 5 failed attempts
    networks:
      - jobqueue-network                         # Custom network for service discovery

  # ============================================
  # Producer Service - Handles API requests and job creation
  # ============================================
  producer:
    build: .                                      # Build from Dockerfile in current directory
    ports:
      - "8080:8080"                               # Expose REST API on host port 8080
    depends_on:
      postgres:
        condition: service_healthy                # Wait for PostgreSQL to be healthy before starting
      redis:
        condition: service_healthy
    environment:
      # Spring Boot Configuration
      - SPRING_PROFILES_ACTIVE=producer           # Activate producer profile (enables REST endpoints)

      # Redis Configuration (for distributed queue)
      - REDIS_HOST=${REDIS_HOST}                  # Redis host from .env (Upstash or local)
      - REDIS_PORT=${REDIS_PORT}                  # Redis port from .env
      - REDIS_PASSWORD=${REDIS_PASSWORD}          # Redis password from .env

      # PostgreSQL Configuration (overrides .env for Docker)
      - POSTGRES_HOST=postgres                    # Use service name for internal DNS resolution
      - POSTGRES_PORT=5432                        # Internal PostgreSQL port
      - POSTGRES_DB=${POSTGRES_DB}                # Database name from .env
      - POSTGRES_USER=${POSTGRES_USER}            # Database user from .env
      - POSTGRES_PASSWORD=${POSTGRES_PASSWORD}    # Database password from .env
    networks:
      - jobqueue-network

  # ============================================
  # Worker Service - Processes jobs from Redis queue
  # ============================================
  # Instance 1
  worker-1:
    build: .                                      # Same image as producer (different profile)
    depends_on:
      postgres:
        condition: service_healthy                # Wait for database before processing jobs
      redis:
        condition: service_healthy
    environment:
      # Spring Boot Configuration
      - SPRING_PROFILES_ACTIVE=worker             # Activate worker profile

      # Redis Configuration (for consuming jobs)
      - REDIS_HOST=${REDIS_HOST}                  # Redis host from .env
      - REDIS_PORT=${REDIS_PORT}                  # Redis port from .env
      - REDIS_PASSWORD=${REDIS_PASSWORD}          # Redis password from .env

      # PostgreSQL Configuration (for storing results)
      - POSTGRES_HOST=postgres                    # Use service name for internal DNS
      - POSTGRES_PORT=5432                        # Internal PostgreSQL port
      - POSTGRES_DB=${POSTGRES_DB}                # Database name from .env
      - POSTGRES_USER=${POSTGRES_USER}            # Database user from .env
      - POSTGRES_PASSWORD=${POSTGRES_PASSWORD}    # Database password from .env
    networks:
      - jobqueue-network

  # Instance 2
  worker-2:
    build: .                                      # Same image as producer (different profile)
    depends_on:
      postgres:
        condition: service_healthy                # Wait for database before processing jobs
      redis:
        condition: service_healthy
    environment:
      # Spring Boot Configuration
      - SPRING_PROFILES_ACTIVE=worker             # Activate worker profile

      # Redis Configuration (for consuming jobs)
      - REDIS_HOST=${REDIS_HOST}                  # Redis host from .env
      - REDIS_PORT=${REDIS_PORT}                  # Redis port from .env
      - REDIS_PASSWORD=${REDIS_PASSWORD}          # Redis password from .env

      # PostgreSQL Configuration (for storing results)
      - POSTGRES_HOST=postgres                    # Use service name for internal DNS
      - POSTGRES_PORT=5432                        # Internal PostgreSQL port
      - POSTGRES_DB=${POSTGRES_DB}                # Database name from .env
      - POSTGRES_USER=${POSTGRES_USER}            # Database user from .env
      - POSTGRES_PASSWORD=${POSTGRES_PASSWORD}    # Database password from .env
    networks:
      - jobqueue-network

  # ============================================
  # Maintenance Service -
  # ============================================
  maintenance:
    build: .                                      # Same image as producer (different profile)
    depends_on:
      postgres:
        condition: service_healthy                # Wait for database before processing jobs
      redis:
        condition: service_healthy
    environment:
      # Spring Boot Configuration
      - SPRING_PROFILES_ACTIVE=maintenance             # Activate maintenance profile

      # Redis Configuration (for consuming jobs)
      - REDIS_HOST=${REDIS_HOST}                  # Redis host from .env
      - REDIS_PORT=${REDIS_PORT}                  # Redis port from .env
      - REDIS_PASSWORD=${REDIS_PASSWORD}          # Redis password from .env

      # PostgreSQL Configuration (for storing results)
      - POSTGRES_HOST=postgres                    # Use service name for internal DNS
      - POSTGRES_PORT=5432                        # Internal PostgreSQL port
      - POSTGRES_DB=${POSTGRES_DB}                # Database name from .env
      - POSTGRES_USER=${POSTGRES_USER}            # Database user from .env
      - POSTGRES_PASSWORD=${POSTGRES_PASSWORD}    # Database password from .env
    networks:
      - jobqueue-network

  # ============================================
  # Prometheus & Grafana
  # ============================================
  prometheus:
    image: prom/prometheus:v2.45.0
    container_name: prometheus
    volumes:
      - ./prometheus.yml:/etc/prometheus/prometheus.yml
      - prometheus_data:/prometheus
    ports:
      - "9090:9090"
    networks:
      - jobqueue-network
    command:
      - --config.file=/etc/prometheus/prometheus.yml
      - --storage.tsdb.path=/prometheus
      - --storage.tsdb.retention.time=30d
      - --web.console.libraries=/usr/share/prometheus/console_libraries
      - --web.console.templates=/usr/share/prometheus/consoles
      - --web.enable-lifecycle

  grafana:
    image: grafana/grafana:10.1.0
    container_name: grafana
    ports:
      - "3000:3000"
    volumes:
      - ./grafana/provisioning:/etc/grafana/provisioning
      - grafana_data:/var/lib/grafana
    environment:
      - GF_SECURITY_ADMIN_PASSWORD=admin  # change in production
      - GF_INSTALL_PLUGINS=grafana-piechart-panel
    networks:
      - jobqueue-network
    depends_on:
      - prometheus

# ============================================
# Persistent Storage
# ============================================
volumes:
  postgres_data:                                  # Named volume for PostgreSQL persistence
  prometheus_data:
  grafana_data:
  # Data persists even after containers are removed

# ============================================
# Networking
# ============================================
networks:
  jobqueue-network:
    driver: bridge                                # Bridge network for inter-container communication
    # Services can reach each other using service names (e.g., 'postgres', 'producer')